name: Release

# Triggered by pushing a `v*` tag. Builds a signed + notarized DMG, signs
# the update artifact with the Tauri updater key, uploads to a GitHub
# Release, and auto-generates the `latest.json` the in-app updater fetches.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY            contents of ~/.tauri/dispatch.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   blank if you generated key without a password
#   APPLE_SIGNING_IDENTITY               "Developer ID Application: Your Name (TEAMID)"
#   APPLE_CERTIFICATE                    base64 of the .p12 cert export
#   APPLE_CERTIFICATE_PASSWORD           password for the .p12
#   APPLE_ID                             your dev account email
#   APPLE_PASSWORD                       app-specific password from appleid.apple.com
#   APPLE_TEAM_ID                        10-char team ID

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build, sign, notarize, and upload
        uses: tauri-apps/tauri-action@v0
        env:
          # Updater signing (required for auto-update to work)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

          # Apple code signing + notarization
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Dispatch ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md."
          releaseDraft: false
          prerelease: false
          # Universal binary so one DMG works on Apple Silicon + Intel.
          args: --target universal-apple-darwin
